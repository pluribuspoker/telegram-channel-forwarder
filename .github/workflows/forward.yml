name: Telegram Forwarder

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        run: |
          git fetch origin state --depth=1 || true
          git checkout origin/state -- state.json 2>/dev/null || echo '{}' > state.json

      - name: Run forwarder
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          SOURCE_CHANNEL: ${{ secrets.SOURCE_CHANNEL }}
          SOURCE_TOPIC_ID: ${{ secrets.SOURCE_TOPIC_ID }}
          DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
        run: python forwarder.py --limit 50

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan state-tmp
          git reset
          git add --force state.json
          git commit -m "update state" || echo "No state change"
          git branch -M state-tmp state
          git push --force origin state
