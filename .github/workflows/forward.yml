name: Telegram Forwarder

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      destination:
        description: "Destination channel (test uses test_dest_channel from each mapping)"
        required: true
        default: "real"
        type: choice
        options:
          - real
          - test
      clear_state:
        description: "Clear state before running: mapping id to clear one, 'all' to clear everything, leave blank to skip"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        run: |
          git fetch origin state --depth=1 || true
          git checkout origin/state -- state.json 2>/dev/null || echo '{}' > state.json

      - name: Run forwarder
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          MAPPINGS_CONFIG: ${{ secrets.MAPPINGS_CONFIG }}
        run: |
          python forwarder.py \
            --limit 50 \
            ${{ inputs.destination == 'test' && '--test' || '' }} \
            ${{ inputs.clear_state != '' && format('--clear-state {0}', inputs.clear_state) || '' }}

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan state-tmp
          git reset
          git add --force state.json
          git commit -m "update state" || echo "No state change"
          git branch -M state-tmp state
          git push --force origin state
